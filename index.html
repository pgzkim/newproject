<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iintoo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="left">
            <img src="bg.jpg" class="bg-img" alt="iintoo welcome image">
            <img src="logo.svg" class="svg-logo" alt="iintoo">
        </div>


        <div class="right">
            <h2>Get iintoo it today</h2>
            <p>There is no charge or obligation upon registration.</p>
            <div class="buttons">

                <button class="button-fb" type="button">
                    <img src="facebook.svg" class="fb-img" alt="facebook"
                        width="24">Register with Facebook</button>


                <button class="button-link" type="button">
                    <img src="linkedin.svg" class="link-img" alt="linkedin"
                        width="24">Register with Linkedin</button>


            </div>
            <div class="or">
                <span>OR</span>
            </div>


            <form class="form1">
                <div class="email-input">
                    <label for="email">Email</label>
                <input type="email" id="Email">
                </div>

               <div class="phone-input">
                <label for="tel">Phone</label>
                <input type="tel" id="tel">
               </div>
            </form>

            <h3>What type of investor are you?</h3>
            <p style="font-size: 14px;">Select the type of investor you are below.</p>

            <div class="form2">
                <label>
            <input type="radio" name="qwe">
            Individual <span class="info">ⓘ
                <span class="title-text">I am a natural person investing on my own behalf as a sole owner, joint tenant,
or tenant in common.</span>
            </span>
                </label>
                <label>
            <input type="radio" name="qwe">
            Business <span class="info">ⓘ
                <span class="title-text">I am a natural person investing on my own behalf as a sole owner, joint tenant,
or tenant in common.</span>
            </span>
                </label>
                <label>
            <input type="radio" name="qwe">
            IRA <span class="info">ⓘ
                <span class="title-text">I am a natural person investing on my own behalf as a sole owner, joint tenant,
or tenant in common.</span>
            </span>
                </label>
                <label>
            <input type="radio" name="qwe">
            Trust <span class="info">ⓘ
                <span class="title-text">I am a natural person investing on my own behalf as a sole owner, joint tenant,
or tenant in common.</span>
            </span>
                </label>
            </div>


            <div class="checkbox-text">
            <input type="checkbox">
            I agree to the terms and receiving notifications from iintoo 
             <a href="iintooo" style="color: rgb(22, 153, 213);text-decoration: underline;">View full terms</a>
            </div>

            <div class="create-btn">
                <button type="submit" class="btn">Create Account</button>
            </div>


        </div>
    </main>
</body>

</html>
